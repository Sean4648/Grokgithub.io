<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年共产主义小组</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            background-color: #F9F9F9; 
            color: #A80000; 
            /* 增加全局基础行高，配合更大的字体 */
            line-height: 1.8;
            font-size: 20px; 
        }

        /* 透明导航栏 */
        header {
            position: absolute; top: 0; width: 100%;
            padding: 30px 50px; display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo {
            font-size: 32px; /* 标志放大 */
            font-weight: 900; color: #CC0000; 
            text-decoration: none; letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,1);
        }
        .nav-links a {
            color: #CC0000; text-decoration: none; 
            font-size: 22px; /* 导航链接放大 */
            font-weight: bold; margin-left: 35px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.9); transition: all 0.3s;
        }
        .nav-links a:hover {
            color: #FF0000; background-color: rgba(255,255,255,0.8);
            padding: 5px 12px; border-radius: 4px;
        }

        /* 全屏首屏 */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.9)),
                url('https://images.unsplash.com/photo-1574621100236-d25abdf4bf18?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-position: center top; padding: 0 20px;
        }
        .hero h1 {
            font-size: 9vw; /* 巨型标语再微调变大 */
            font-weight: 900; color: #DD0000; 
            letter-spacing: 12px; margin-bottom: 20px;
            text-shadow: 0 5px 20px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.8);
        }
        .hero p {
            font-size: 3vw; /* 副标题放大 */
            font-weight: bold; color: #A80000; 
            letter-spacing: 8px; text-shadow: 0 4px 15px rgba(255,255,255,1);
        }

        /* 使命区 */
        .mission {
            background-color: #FFFFFF; padding: 100px 20px;
            text-align: center; border-top: 4px solid #CC0000; 
        }
        .mission-container {
            max-width: 1400px; /* 容器加宽以适应更大的文字 */
            margin: 0 auto; display: flex;
            justify-content: space-around; flex-wrap: wrap; gap: 40px;
        }
        .mission-item {
            flex: 1; min-width: 320px; padding: 50px 40px;
            background-color: #FFF5F5; border: 2px solid #FFCCCC; 
            border-radius: 8px; transition: transform 0.3s;
        }
        .mission-item:hover { transform: translateY(-5px); border-color: #CC0000; }
        .mission-item h2 { 
            font-size: 32px; /* 卡片标题放大 */
            color: #CC0000; margin-bottom: 20px; 
        }
        .mission-item p { 
            font-size: 22px; /* 正文大幅放大，彻底解决看不清的问题 */
            color: #555555; text-align: justify; font-weight: bold; 
        }

        footer { background-color: #CC0000; text-align: center; padding: 50px 20px; }
        footer h3 { 
            font-size: 32px; /* 页脚口号放大 */
            color: #FFFFFF; letter-spacing: 8px; 
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">★ 马列毛主义万岁！</a>
        <div class="nav-links">
            <a href="index.html">主页</a>
            <a href="#mission">使命</a>
            <a href="theory.html">理论</a>
        </div>
    </header>

    <section id="hero" class="hero">
        <h1>青年共产主义小组</h1>
        <p>学习 · 批判 · 行动</p>
    </section>

    <section id="mission" class="mission">
        <div class="mission-container">
            <div class="mission-item">
                <h2>学习经典理论</h2>
                <p>抛弃庸俗化的学术解释，回归马列毛主义的原典。用历史唯物主义和辩证唯物主义武装头脑，掌握分析当代社会的终极武器。</p>
            </div>
            <div class="mission-item">
                <h2>立足无产阶级</h2>
                <p>理论不能脱离实际。青年必须走向工农，倾听劳动者的声音，深刻理解现代生产关系下的剥削形式，为无产阶级利益发声。</p>
            </div>
            <div class="mission-item">
                <h2>探索未来道路</h2>
                <p>不盲从、不教条。在数字时代和全新的生产力条件下，思考社会主义革命的新路径，为最终的共产主义事业蓄力。</p>
            </div>
        </div>
    </section>

    <footer>
        <h3>全世界无产者，联合起来！</h3>
    </footer>

</body>
</html>
