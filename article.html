<!DOCTYPE html>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background-color: #F9F9F9; 
            color: #333333; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        header {
            background-color: #FFFFFF;

        /* ★ 核心修改：Logo 区域动效，与主页保持一致 ★ */
        .logo {

            font-weight: 900; 
            color: #CC0000; 
            text-decoration: none; 
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left center;
        }
        
        .logo .star {
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.15); 
        }
        
        .logo:hover .star {
            transform: scale(1.4) rotate(36deg);
            color: #FFD700;
        }

        .nav-links a {
            color: #CC0000; text-decoration: none; font-size: 18px;
            font-weight: bold; margin-left: 30px; transition: all 0.3s;
        }
        .nav-links a:hover {
            color: #FFFFFF; background-color: #CC0000;
            padding: 5px 10px; border-radius: 4px;
        }

        /* 下载卡片区 */
        main {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }
        .download-card {
            background-color: #FFFFFF;
            border: 2px solid #FFCCCC;
            border-top: 8px solid #CC0000; 
            border-radius: 12px;
            padding: 60px 50px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(204, 0, 0, 0.08);
        }
        .doc-icon {
            font-size: 70px;
            color: #CC0000;
            margin-bottom: 25px;
        }
        .download-card h1 {
            font-size: 36px;
            color: #CC0000;
            margin-bottom: 10px;
            font-weight: 900;
        }
        .download-card .subtitle {
            font-size: 20px;
            color: #A80000;
            margin-bottom: 35px;
            font-weight: bold;
        }
        .abstract {
            text-align: left;
            background: #FFF5F5;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 40px;
            font-size: 16px;
            line-height: 1.8;
            color: #555;
            border-left: 5px solid #CC0000;
        }

        /* 醒目的下载按钮 */
        .btn-download {
            display: inline-block;
            background-color: #CC0000;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 60px;
            border-radius: 50px;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(204, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .btn-download:hover {
            background-color: #A80000;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(204, 0, 0, 0.4);
        }

        footer { 
            background-color: #CC0000; 
            text-align: center; 
            padding: 40px 20px; 
        }
        footer h3 { font-size: 26px; color: #FFFFFF; letter-spacing: 4px; }
    </style>
</head>
<body>
